<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Believe In You</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class = "container">
    <div class="app-header">
        <h1>Believe In You</h1>
        <p>今日も自分を信じよう</p>
    </div>

    <div class="content">

        <!--気分記録-->
        <div class="mood-section">
            <p class="section-title">今日の気分は？</p>
            <div class="mood-buttons">
                <button class="mood-btn" onclick="selectMood('最高')">😄</button>
                <button class="mood-btn" onclick="selectMood('良い')">😊</button>
                <button class="mood-btn" onclick="selectMood('普通')">😑</button>
                <button class="mood-btn" onclick="selectMood('良くない')">😣</button>
                <button class="mood-btn" onclick="selectMood('最悪')">😓</button>
            </div> <!--mood buttons-->
            <p id="selectedMood" class="selected-mood"></p>
        </div> <!--mood section-->

        <!--今日の良いこと-->
        <div class="good-section">
            <p class="section-title">今日の良いこと</p>
            <input id="goodInput" type="text" placeholder="小さいことでもOK！">
            <button onclick="addGood()">追加する</button>
            <ul id="goodList"></ul>
        </div> <!--good section-->

        <!--一言日記-->
        <div class="diary-section">
            <p class="section-title">今日の一言</p>
            <textarea id="diaryInput" placeholder="今日はどんな日でしたか？"></textarea>
        </div> <!--diary section-->

        <!--保存ボタン-->
        <button id="saveBtn" onclick="saveEntry()">今日を保存する</button>

        <!--過去の記録-->
        <div class = "history-section">
            <p class = "section-title">過去の記録</p>

            <div class = "carousel">
                <button class = "carousel-btn" onclick = "prevEntry()">◀</button>
                <div id = "historyList"></div>
                <button class = "carousel-btn" onclick = "nextEntry()">▶</button>
            </div>

            <p id = "carouselCounter" class = "carousel-counter"></p>
        </div>
        
        </div> <!--content-->
    </div> <!--container-->
    <script src="scripts.js"></script>
</body>
</html>
